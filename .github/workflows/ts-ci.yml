# TS SDK CI — matrix-tests the TypeScript SDK on Node.js 22/24/25,
# Deno 2.x, and Bun 1.x. Cross-language interop jobs run only on Linux
# (where the Rust binaries are prebuilt) to avoid macOS/Windows Rust
# spawn complexity.
#
# See TS_PHASE_8_TESTING.md §10.
#
# NOTE: This is a pre-build scaffold. Steps are stubs; dependencies are
# NOT installed yet. Fill in build/test commands once the SDK packages
# are implemented.
name: TS SDK CI

on:
  push:
    paths:
      - "implementations/typescript/**"
      - "test-vectors/**"
      - ".github/workflows/ts-ci.yml"
  pull_request:
    paths:
      - "implementations/typescript/**"
      - "test-vectors/**"

jobs:
  unit:
    name: Unit + conformance (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [node-22, node-24, node-25, deno, bun]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        if: matrix.runtime == 'node-22'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Node 24
        if: matrix.runtime == 'node-24'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Node 25 (for QUIC)
        if: matrix.runtime == 'node-25'
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Setup Deno
        if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2

      - name: Install deps (Node)
        if: startsWith(matrix.runtime, 'node')
        working-directory: implementations/typescript
        run: npm ci

      - name: Unit + conformance (Node)
        if: startsWith(matrix.runtime, 'node')
        working-directory: implementations/typescript
        run: npx vitest run --config test/vitest.config.ts

      - name: Unit + conformance (Deno)
        if: matrix.runtime == 'deno'
        working-directory: implementations/typescript
        run: deno run --allow-read --allow-env --allow-net npm:vitest run

      - name: Unit + conformance (Bun)
        if: matrix.runtime == 'bun'
        working-directory: implementations/typescript
        run: bun run vitest run

  interop:
    name: TS <-> Rust interop
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: 25
      - name: Install TS deps
        working-directory: implementations/typescript
        run: npm ci
      - name: Build Rust interop binaries
        run: cargo build --release -p aafp-cli -p aafp-echo-agent
      - name: Export Rust test vectors + golden traces
        run: cargo run --release -p aafp-conformance --bin export_golden
      - name: TS client <-> Rust server interop
        working-directory: implementations/typescript
        run: npx vitest run --config test/vitest.config.ts test/interop.test.ts
        env:
          AAFP_RUST_BIN: ./target/release
          NODE_OPTIONS: "--experimental-quic"

  conformance-golden:
    name: Conformance + golden trace replay
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: 25
      - name: Install TS deps
        working-directory: implementations/typescript
        run: npm ci
      - name: Export Rust vectors
        run: cargo run --release -p aafp-conformance --bin export_vectors
      - name: Conformance + golden trace tests
        working-directory: implementations/typescript
        run: npx vitest run --config test/vitest.config.ts test/conformance.test.ts test/golden-trace.test.ts
