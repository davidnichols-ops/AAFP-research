global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'aafp-relay'
    static_configs:
      - targets: ['relay:9090']
        labels:
          agent_role: 'relay'

  - job_name: 'aafp-agent-1'
    static_configs:
      - targets: ['agent-1:9090']
        labels:
          agent_role: 'agent'

  - job_name: 'aafp-agent-2'
    static_configs:
      - targets: ['agent-2:9090']
        labels:
          agent_role: 'agent'
